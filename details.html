<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>ببینتو · جزئیات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="author" content="Arya Azadeh" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="arad-font.css" />
    <link rel="stylesheet" href="bebinto-common.css" />

    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>


    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.polyfilled.js"
    ></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/plyr@3/dist/plyr.css"
    />

    <link rel="shortcut icon" href="favicon.webp" type="image/x-icon" />

    <style>
      @media (prefers-reduced-motion: reduce) {
        .motion-safe-anim {
          transition: none !important;
          animation: none !important;
        }
      }

      .download-tip {
        border-color: rgba(245, 158, 11, 0.35);
        background-color: rgba(245, 158, 11, 0.14);
        color: #fde68a;
      }

      .light .download-tip {
        border-color: rgba(217, 119, 6, 0.35);
        background-color: rgba(254, 243, 199, 0.9);
        color: #92400e;
      }

      .bino-swiper .swiper-pagination-bullet {
        background: rgba(255, 255, 255, 0.4);
      }

      .bino-swiper .swiper-pagination-bullet-active {
        background: var(--color-accent);
      }

      /* Skeleton shimmer */
      .shimmer {
        position: relative;
        overflow: hidden;
      }
      .shimmer::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(100%);
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        animation: shimmer 1.1s infinite;
      }
      .light .shimmer::after {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(24, 24, 27, 0.12),
          transparent
        );
      }
      .light .skeleton-tone {
        background-color: rgba(212, 212, 216, 0.9) !important;
      }
      @keyframes shimmer {
        100% {
          transform: translateX(-100%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .shimmer::after {
          animation: none !important;
        }
      }
    </style>

    <style type="text/tailwindcss">
      @theme {
        --font-sans: "AradVF", system-ui, sans-serif;
        --font-heading: "AradVF", sans-serif;
        --color-bg: #09090b;
        --color-surface: #18181b;
        --color-surface-highlight: #27272a;
        --color-text-primary: #f4f4f5;
        --color-text-secondary: #a1a1aa;
        --color-border: #27272a;
        --color-accent: #c4b5fd;
        --color-accent-text: #24124d;
      }

      html.light {
        --color-bg: #f4f4f5;
        --color-surface: #ffffff;
        --color-surface-highlight: #f4f4f5;
        --color-text-primary: #18181b;
        --color-text-secondary: #52525b;
        --color-border: #e4e4e7;
        --color-accent: #8b5cf6;
        --color-accent-text: #ffffff;
      }

      @layer utilities {
        .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background-color: #3f3f46;
          border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background-color: #52525b;
        }
        .light .custom-scrollbar::-webkit-scrollbar-thumb {
          background-color: #d4d4d8;
        }
        .light .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background-color: #a1a1aa;
        }

        .hide-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
      }
    </style>
  </head>

  <body
    x-data="BebintoDetailsApp()"
    x-init="init()"
    @scroll.window="handleScroll()"
    @keydown.escape.window="handleEscape()"
    class="bg-bg text-text-primary font-sans antialiased selection:bg-accent selection:text-accent-text"
  >
    <div class="min-h-screen flex flex-col pb-28 lg:pb-0">
      <!-- Mobile Header -->
      <div
        class="lg:hidden sticky top-0 z-40 bg-bg/70 backdrop-blur-xl border-b border-border"
      >
        <div class="px-4 py-2 flex items-center justify-between gap-3">
          <button
            type="button"
            @click="haptic('light'); goBack()"
            class="inline-flex items-center gap-2 text-sm font-semibold text-text-secondary hover:text-text-primary transition-colors"
            aria-label="بازگشت"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 8l4 4m0 0l-4 4m4-4H3"
              />
            </svg>
            بازگشت
          </button>

          <a
            href="./index.html"
            class="flex items-center gap-2 shrink-0"
            aria-label="خانه"
          >
            <div
              class="h-9 w-9 rounded-2xl flex items-center justify-center overflow-hidden"
            >
              <img
                src="favicon.webp"
                alt="Bebinto"
                class="h-full w-full object-contain"
                loading="lazy"
                decoding="async"
              />
            </div>
            <span class="text-sm font-bold">ببینتو</span>
          </a>

          <button
            type="button"
            @click="haptic('light'); toggleTheme()"
            class="mr-auto w-10 h-10 flex items-center justify-center rounded-2xl bg-surface border border-border hover:bg-surface-highlight transition-all duration-200"
            :aria-label="theme === 'dark' ? 'تغییر به حالت روشن' : 'تغییر به حالت تاریک'"
          >
            <!-- Sun -->
            <svg
              x-show="theme === 'dark'"
              x-transition
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-yellow-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364 6.364l-1.414-1.414M6.05 6.05L4.636 4.636m12.728 0l-1.414 1.414M6.05 17.95l-1.414 1.414M12 8a4 4 0 100 8 4 4 0 000-8z"
              />
            </svg>

            <!-- Moon -->
            <svg
              x-show="theme === 'light'"
              x-transition
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-violet-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"
              />
            </svg>
          </button>
        </div>

        <div x-show="showCompactHeader && item" x-transition class="px-4 pb-2">
          <div
            class="flex items-center justify-between gap-3 rounded-2xl bg-surface/70 border border-border px-3 py-2"
          >
            <div class="min-w-0">
              <div
                class="text-xs font-bold truncate"
                x-text="displayTitle(item)"
              ></div>
              <div class="mt-1 text-[11px] text-text-secondary">
                <span x-text="type === 'series' ? 'سریال' : 'فیلم'"></span>
                <span class="mx-1">•</span>
                <span x-text="item?.year || '—'"></span>
                <template x-if="item?.rating">
                  <span class="mx-1">•</span>
                  <span>⭐ <span x-text="item.rating"></span></span>
                </template>
              </div>
            </div>
            <template x-if="item?.imdb">
              <span
                class="shrink-0 text-[11px] font-bold bg-yellow-400 text-black px-2 py-1 rounded-full"
              >
                IMDb <span x-text="item.imdb"></span>
              </span>
            </template>
          </div>
        </div>
      </div>

      <div class="flex-grow flex justify-center p-4 sm:p-6 lg:p-8">
        <div
          class="w-full max-w-screen-2xl grid gap-8 lg:grid-cols-[340px_1fr]"
        >
          <!-- Sidebar Desktop -->
          <aside class="hidden lg:block">
            <!-- ✅ sticky: poster + quick info -->
            <div class="space-y-4 lg:sticky lg:top-8 h-fit">
              <div class="flex items-center justify-between gap-3 mb-2">
                <a
                  href="./index.html"
                  class="flex items-center gap-3 group min-w-0"
                  aria-label="خانه"
                >
                  <div
                    class="h-10 w-10 rounded-2xl flex items-center justify-center overflow-hidden"
                  >
                    <img
                      src="favicon.webp"
                      alt="Bebinto"
                      class="h-full w-full object-contain"
                      loading="lazy"
                      decoding="async"
                    />
                  </div>
                  <div class="min-w-0">
                    <div class="text-lg font-bold font-heading">ببینتو</div>
                    <div class="text-xs text-text-secondary">
                      جزئیات فیلم / سریال
                    </div>
                  </div>
                </a>

                <!-- Theme Toggle -->
                <button
                  type="button"
                  @click="haptic('light'); toggleTheme()"
                  class="w-10 h-10 flex items-center justify-center rounded-2xl bg-surface border border-border hover:bg-surface-highlight transition-all duration-200"
                  :aria-label="theme === 'dark' ? 'تغییر به حالت روشن' : 'تغییر به حالت تاریک'"
                >
                  <!-- Sun -->
                  <svg
                    x-show="theme === 'dark'"
                    x-transition
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5 text-yellow-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.364 6.364l-1.414-1.414M6.05 6.05L4.636 4.636m12.728 0l-1.414 1.414M6.05 17.95l-1.414 1.414M12 8a4 4 0 100 8 4 4 0 000-8z"
                    />
                  </svg>

                  <!-- Moon -->
                  <svg
                    x-show="theme === 'light'"
                    x-transition
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5 text-violet-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"
                    />
                  </svg>
                </button>
              </div>

              <button
                type="button"
                @click="haptic('light'); goBack()"
                class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-surface border border-border hover:bg-surface-highlight transition-colors text-sm font-semibold"
                aria-label="بازگشت"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M17 8l4 4m0 0l-4 4m4-4H3"
                  />
                </svg>
                بازگشت
              </button>

              <!-- Poster -->
              <div
                class="relative rounded-2xl overflow-hidden border border-border bg-surface-highlight/40 shadow-2xl shadow-black/30"
              >
                <div class="aspect-[2/3] relative">
                  <!-- ✅ Skeleton shimmer تا زمان لود -->
                  <div
                    x-show="!posterLoaded"
                    x-cloak
                    class="absolute inset-0 bg-surface-highlight/60 skeleton-tone shimmer"
                    aria-hidden="true"
                  ></div>

                  <img
                    x-ref="posterImg"
                    :src="posterSrc"
                    class="absolute inset-0 w-full h-full object-cover transition-opacity duration-300"
                    :class="posterLoaded ? 'opacity-100' : 'opacity-0'"
                    loading="lazy"
                    @load="handlePosterLoad()"
                    @error="handlePosterError()"
                    :alt="displayTitle(item)"
                  />
                </div>

                <div class="absolute top-3 right-3 flex items-center gap-2">
                  <template x-if="item?.imdb">
                    <div
                      class="flex items-center gap-1 bg-yellow-400 text-black font-bold text-xs px-2 py-1 rounded-full shadow-lg"
                    >
                      <span>IMDb</span>
                      <span x-text="item.imdb"></span>
                    </div>
                  </template>

                  <template
                    x-if="item?.classification && item.classification !== 'N/A'"
                  >
                    <div
                      class="bg-black/60 backdrop-blur text-white text-xs px-2 py-1 rounded-full border border-white/10 shadow-sm"
                      x-text="item.classification"
                    ></div>
                  </template>
                </div>

                <button
                  type="button"
                  @click="haptic('light'); item && toggleWatchlist(item)"
                  class="absolute top-3 left-3 z-10 p-2 rounded-full bg-black/50 backdrop-blur-sm text-white hover:bg-accent hover:text-accent-text transition-colors"
                  :aria-label="item && isInWatchlist(item.id) ? 'حذف از لیست من' : 'افزودن به لیست من'"
                >
                  <svg
                    class="w-6 h-6"
                    :class="{'fill-current text-red-500': item && isInWatchlist(item.id)}"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.5l1.318-1.182a4.5 4.5 0 116.364 6.364L12 21l-7.682-7.318a4.5 4.5 0 010-6.364z"
                    ></path>
                  </svg>
                </button>
              </div>

              <!-- Quick info -->
              <div
                class="p-4 rounded-2xl bg-surface border border-border space-y-2"
              >
                <div class="flex items-center justify-between">
                  <div class="text-xs text-text-secondary">اطلاعات سریع</div>
                </div>

                <div class="grid grid-cols-2 gap-2 text-sm">
                  <div
                    class="p-3 rounded-2xl bg-surface-highlight/40 border border-border"
                  >
                    <div class="text-xs text-text-secondary">سال</div>
                    <div
                      class="font-bold mt-1"
                      x-text="item?.year || '—'"
                    ></div>
                  </div>

                  <div
                    class="p-3 rounded-2xl bg-surface-highlight/40 border border-border"
                  >
                    <div class="text-xs text-text-secondary">کشور</div>
                    <div
                      class="font-bold mt-1 truncate"
                      :title="displayCountry(item)"
                      x-text="displayCountry(item) || '—'"
                    ></div>
                  </div>

                  <template x-if="item?.durationText">
                    <div
                      class="p-3 rounded-2xl bg-surface-highlight/40 border border-border col-span-2"
                    >
                      <div
                        class="text-xs text-text-secondary"
                        x-text="type==='series' ? 'مدت/فصل' : 'مدت'"
                      ></div>
                      <div
                        class="font-bold mt-1"
                        x-text="item.durationText"
                      ></div>
                    </div>
                  </template>

                  <template x-if="item?.rating">
                    <div
                      class="p-3 rounded-2xl bg-surface-highlight/40 border border-border col-span-2"
                    >
                      <div class="text-xs text-text-secondary">
                        امتیاز برنامه
                      </div>
                      <div class="font-bold mt-1 flex items-center gap-2">
                        <span aria-hidden="true">⭐</span>
                        <span x-text="item.rating"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </aside>

          <!-- MAIN -->
          <main class="min-w-0">
            <!-- Hero -->
            <section
              class="relative overflow-hidden rounded-2xl border border-border bg-surface shadow-2xl shadow-black/20"
            >
              <div class="absolute inset-0">
                <div
                  class="absolute inset-0 bg-center bg-cover scale-110 blur-2xl opacity-35"
                  :style="heroBackdropStyle()"
                  aria-hidden="true"
                ></div>
                <div
                  class="absolute inset-0 bg-gradient-to-t from-bg via-bg/70 to-bg/30"
                  aria-hidden="true"
                ></div>
              </div>

              <div class="relative p-4 sm:p-6 lg:p-7">
                <div class="flex items-center justify-between gap-3">
                  <div
                    class="flex items-center gap-2 text-xs text-text-secondary"
                  >
                    <span
                      class="px-2 py-1 rounded-full bg-surface-highlight/60 border border-border"
                      x-text="type === 'series' ? 'سریال' : 'فیلم'"
                    ></span>
                    <span x-text="item?.year || '—'"></span>

                    <template x-if="item?.imdb">
                      <span class="inline-flex items-center gap-2">
                        <span
                          class="w-1 h-1 rounded-full bg-text-secondary/50"
                        ></span>
                        <span
                          class="font-bold bg-yellow-400 text-black px-2 py-0.5 rounded-full"
                          >IMDb <span x-text="item.imdb"></span
                        ></span>
                      </span>
                    </template>
                  </div>

                  <!-- mobile small hint -->
                  <div
                    class="lg:hidden text-xs text-text-secondary"
                    x-text="isMovie ? 'برای دانلود پایین برو' : 'فصل‌ها پایین هستند'"
                  ></div>
                </div>

                <!-- Skeleton -->
                <template x-if="loading">
                  <div
                    class="mt-6 grid gap-6 lg:grid-cols-[260px_1fr] animate-pulse"
                  >
                    <div
                      class="aspect-[2/3] rounded-2xl bg-surface-highlight/60 skeleton-tone"
                    ></div>
                    <div class="space-y-4">
                      <div
                        class="h-8 rounded-2xl bg-surface-highlight/60 skeleton-tone w-3/4"
                      ></div>
                      <div
                        class="h-4 rounded-2xl bg-surface-highlight/60 skeleton-tone w-1/2"
                      ></div>
                      <div
                        class="h-24 rounded-2xl bg-surface-highlight/60 skeleton-tone"
                      ></div>
                      <div
                        class="h-24 rounded-2xl bg-surface-highlight/60 skeleton-tone"
                      ></div>
                    </div>
                  </div>
                </template>

                <!-- Error -->
                <template x-if="!loading && error">
                  <div class="error-alert mt-6 p-4 sm:p-6 rounded-2xl">
                    <div class="flex items-start gap-3">
                      <div
                        class="w-10 h-10 rounded-2xl bg-red-500/20 flex items-center justify-center"
                      >
                        ⚠️
                      </div>
                      <div class="min-w-0">
                        <div class="error-title font-bold">خطا</div>
                        <p class="text-sm mt-1" x-text="error"></p>
                        <div class="mt-4 flex flex-wrap gap-2">
                          <button
                            type="button"
                            @click="haptic('light'); window.location.reload()"
                            class="error-refresh-btn inline-flex items-center justify-center px-4 py-2 rounded-2xl font-semibold transition-colors"
                          >
                            رفرش صفحه
                          </button>
                          <a
                            href="./index.html"
                            class="inline-flex items-center justify-center px-4 py-2 rounded-2xl bg-accent text-accent-text font-bold hover:opacity-90 transition-opacity"
                          >
                            بازگشت به خانه
                          </a>
                          <button
                            type="button"
                            @click="haptic('light'); goBack()"
                            class="inline-flex items-center justify-center px-4 py-2 rounded-2xl bg-surface border border-border hover:bg-surface-highlight transition-colors font-semibold"
                          >
                            برگشت
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- Main -->
                <template x-if="!loading && item && !error">
                  <div class="mt-6">
                    <div class="flex items-start justify-between gap-4">
                      <div class="min-w-0">
                        <h1
                          class="text-2xl sm:text-3xl lg:text-4xl font-bold font-heading type-display"
                          x-text="displayTitle(item)"
                        ></h1>
                        <template x-if="item.original_title">
                          <p
                            class="text-sm text-text-secondary mt-2 truncate"
                            x-text="item.original_title"
                          ></p>
                        </template>

                        <div class="mt-4 flex flex-wrap gap-2">
                          <template x-for="g in displayGenres(item)" :key="g">
                            <span
                              class="text-xs text-text-secondary bg-surface-highlight px-3 py-1 rounded-full border border-border"
                              x-text="g"
                            ></span>
                          </template>
                        </div>
                      </div>

                      <!-- Desktop watchlist quick -->
                      <button
                        type="button"
                        @click="haptic('light'); toggleWatchlist(item)"
                        class="hidden lg:inline-flex p-2 rounded-full hover:bg-surface-highlight transition-colors"
                        :aria-label="isInWatchlist(item.id) ? 'حذف از لیست من' : 'افزودن به لیست من'"
                      >
                        <svg
                          class="w-7 h-7"
                          :class="isInWatchlist(item.id) ? 'fill-current text-red-500' : 'text-text-secondary'"
                          fill="none"
                          stroke="currentColor"
                          viewBox="0 0 24 24"
                        >
                          <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.5l1.318-1.182a4.5 4.5 0 116.364 6.364L12 21l-7.682-7.318a4.5 4.5 0 010-6.364z"
                          ></path>
                        </svg>
                      </button>
                    </div>

                    <!-- ✅ AI Summary (best spot: after title/genres, before plot) -->
                    <section
                      x-show="aiSummary"
                      class="mt-6 p-4 sm:p-5 rounded-2xl bg-surface border border-border"
                    >
                      <div class="flex items-center justify-between mb-2">
                        <h2
                          class="text-base font-bold font-heading type-section-title flex items-center gap-2"
                        >
                          ✨ خلاصه با بینو
                        </h2>

                        <button
                          type="button"
                          class="text-xs text-text-secondary hover:text-text-primary transition-colors"
                          @click="aiSummaryOpen = !aiSummaryOpen"
                          :aria-expanded="aiSummaryOpen"
                        >
                          <span
                            x-text="aiSummaryOpen ? 'بستن' : 'نمایش'"
                          ></span>
                        </button>
                      </div>

                      <!-- حالت کوتاه -->
                      <p

    <script>
      function BebintoDetailsApp() {
        return {
          baseUrl: "https://bebinto-core.aryazdh.ir",
          apiPrefix: "/api/v1",

          aiSummary: "",
          aiSummaryShort: "",
          aiSummaryOpen: false,
          funFacts: [],
          binoItems: [],
          binoPlaylist: null,
          binoRecsLoading: false,
          binoRecsError: "",
          binoSwiper: null,
          binoSwiperInitAttempts: 0,
          player: null,
          playerSource: null,

          showCompactHeader: false,
          forceCompactHeader: false,

          theme: "dark",
          showBackToTop: false,

          loading: true,
          error: "",

          item: null,
          type: "movie",

          seasons: [],
          openSeasons: [],

          watchlist: [],
          watchlistItemsCache: {},
          watchlistItemsKey: "bebintoWatchlistItems",

          toast: { show: false, message: "" },
          toastTimer: null,

          // Poster skeleton + fallback
          posterLoaded: false,
          posterSrc: "./placeholder.png",
          _posterFallbackUsed: false,

          // Hero background "feel"
          heroLoaded: false,
          heroSrc: "",

          init() {
            this.loadTheme();
            this.loadWatchlist();
            this.loadWatchlistItemsCache();
            this.fetchData();
            this.handleScroll();
            window.addEventListener("resize", () => this.handleScroll());
          },

          // UI
          haptic(level = "light") {
            try {
              if (!navigator.vibrate) return;
              const ms = level === "heavy" ? 30 : level === "medium" ? 20 : 10;
              navigator.vibrate(ms);
            } catch (e) {}
          },

          showToast(msg) {
            this.toast.message = msg;
            this.toast.show = true;
            clearTimeout(this.toastTimer);
            this.toastTimer = setTimeout(() => (this.toast.show = false), 1800);
          },

          handleEscape() {},

          handleScroll() {
            const y = window.scrollY || 0;
            this.showBackToTop = y > 400;
            const isMobile = window.innerWidth < 1024;
            if (y < 40) this.forceCompactHeader = false;
            this.showCompactHeader =
              isMobile && (y > 220 || this.forceCompactHeader);
          },

          getMediaExtension(url) {
            try {
              const raw = String(url || "")
                .split("?")[0]
                .split("#")[0]
                .trim();
              const idx = raw.lastIndexOf(".");
              if (idx === -1) return "";
              return raw.slice(idx + 1).toLowerCase();
            } catch (e) {
              return "";
            }
          },

          getMediaMime(url, explicitType = "") {
            const type = String(explicitType || "")
              .toLowerCase()
              .trim();
            if (type.includes("/")) return type;

            const ext = this.getMediaExtension(url);
            if (ext === "mp4") return "video/mp4";
            if (ext === "m3u8") return "application/vnd.apple.mpegurl";
            if (ext === "webm") return "video/webm";
            if (ext === "ogv" || ext === "ogg") return "video/ogg";
            if (ext === "mov") return "video/quicktime";
            if (ext === "mkv") return "video/x-matroska";
            return "";
          },

          async copyDownloadLink(url) {
            const text = (url || "").toString().trim();
            if (!text) {
              this.showToast("لینکی برای کپی وجود ندارد");
              return;
            }

            try {
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
              } else {
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.setAttribute("readonly", "");
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
              }
              this.showToast("لینک دانلود کپی شد");
            } catch (e) {
              this.showToast("کپی لینک انجام نشد");
            }
          },

          normalizeQuality(quality) {
            const raw = (quality || "").toString().trim();
            if (!raw) return "";
            const m = raw.match(/(\d{3,4})/);
            if (m?.[1]) return m[1];
            return raw.toLowerCase();
          },

          inferQualityFromText(...parts) {
            const text = parts
              .map((p) => (p || "").toString())
              .join(" ")
              .trim();
            if (!text) return "";

            const m = text.match(
              /(?:^|[^0-9])(2160|1440|1080|720|576|480|360)(?:p|[^0-9]|$)/i,
            );
            return m?.[1] || "";
          },

          seasonQualities(season) {
            const uniq = new Set();
            this.normalizeArr(season?.episodes).forEach((ep) => {
              this.normalizeArr(ep?.sources).forEach((src) => {
                const q =
                  this.normalizeQuality(src?.quality) ||
                  this.inferQualityFromText(
                    src?.title,
                    src?.label,
                    ep?.title,
                    season?.title,
                  );
                if (q) uniq.add(q);
              });
            });

            return Array.from(uniq).sort((a, b) => {
              const na = Number(a);
              const nb = Number(b);
              if (Number.isFinite(na) && Number.isFinite(nb)) return nb - na;
              return String(a).localeCompare(String(b));
            });
          },

          async copySeasonQualityLinks(season, quality) {
            const target = this.normalizeQuality(quality);
            if (!target) {
              this.showToast("کیفیت نامعتبر است");
              return;
            }

            const links = [];
            this.normalizeArr(season?.episodes).forEach((ep) => {
              this.normalizeArr(ep?.sources).forEach((src) => {
                const url = (src?.url || "").toString().trim();
                const q =
                  this.normalizeQuality(src?.quality) ||
                  this.inferQualityFromText(
                    src?.title,
                    src?.label,
                    ep?.title,
                    season?.title,
                  );
                if (!url || !q) return;
                if (q === target) links.push(url);
              });
            });

            const uniqueLinks = Array.from(new Set(links));
            if (!uniqueLinks.length) {
              this.showToast(`لینک کیفیت ${target} پیدا نشد`);
              return;
            }

            try {
              const text = uniqueLinks.join("\n");
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
              } else {
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.setAttribute("readonly", "");
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
              }
              this.showToast(
                `${uniqueLinks.length} لینک کیفیت ${target} کپی شد`,
              );
            } catch (e) {
              this.showToast("کپی گروهی انجام نشد");
            }
          },

          async copySeasonAllLinks(season) {
            const links = [];
            this.normalizeArr(season?.episodes).forEach((ep) => {
              this.normalizeArr(ep?.sources).forEach((src) => {
                const url = (src?.url || "").toString().trim();
                if (url) links.push(url);
              });
            });

            const uniqueLinks = Array.from(new Set(links));
            if (!uniqueLinks.length) {
              this.showToast("لینکی برای کپی در این فصل وجود ندارد");
              return;
            }

            try {
              const text = uniqueLinks.join("\n");
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
              } else {
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.setAttribute("readonly", "");
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
              }
              this.showToast(`${uniqueLinks.length} لینک از فصل کپی شد`);
            } catch (e) {
              this.showToast("کپی لینک‌ها انجام نشد");
            }
          },

          // Theme (no toast)
          applyThemeClass() {
            const el = document.documentElement;
            el.classList.remove("light", "dark");
            el.classList.add(this.theme);
          },

          loadTheme() {
            const saved = localStorage.getItem("bebinto-theme");
            this.theme = saved === "light" || saved === "dark" ? saved : "dark";
            this.applyThemeClass();
          },

          toggleTheme() {
            this.theme = this.theme === "dark" ? "light" : "dark";
            localStorage.setItem("bebinto-theme", this.theme);
            this.applyThemeClass();
          },

          // Query & nav
          getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
          },

          goBack() {
            try {
              if (
                document.referrer &&
                document.referrer.includes(window.location.hostname)
              )
                history.back();
              else window.location.href = "./index.html";
            } catch (e) {
              window.location.href = "./index.html";
            }
          },

          get isMovie() {
            return this.type === "movie";
          },

          scrollToPrimarySection() {
            this.forceCompactHeader = true;
            if (this.type === "series") {
              const el = document.getElementById("seasonsSection");
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
              else
                window.scrollTo({
                  top: document.body.scrollHeight,
                  behavior: "smooth",
                });
            } else {
              const el = document.getElementById("downloadsSection");
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
              else
                window.scrollTo({
                  top: document.body.scrollHeight,
                  behavior: "smooth",
                });
            }
          },

          scrollPlayerIntoView() {
            const el = document.getElementById("playerSection");
            if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
          },

          // Hero background style
          heroBackdropStyle() {
            if (!this.heroLoaded || !this.heroSrc) return "";
            return `background-image:url('${this.heroSrc}')`;
          },

          // =========================
          // Watchlist
          // =========================
          loadWatchlist() {
            try {
              const list = localStorage.getItem("bebintoWatchlist");
              this.watchlist = list ? JSON.parse(list) : [];
            } catch (e) {
              this.watchlist = [];
            }
          },

          saveWatchlist() {
            localStorage.setItem(
              "bebintoWatchlist",
              JSON.stringify(this.watchlist),
            );
          },

          loadWatchlistItemsCache() {
            try {
              const raw = localStorage.getItem(this.watchlistItemsKey);
              const parsed = raw ? JSON.parse(raw) : {};
              this.watchlistItemsCache =
                parsed && typeof parsed === "object" ? parsed : {};
            } catch (e) {
              this.watchlistItemsCache = {};
            }
          },

          saveWatchlistItemsCache() {
            try {
              localStorage.setItem(
                this.watchlistItemsKey,
                JSON.stringify(this.watchlistItemsCache || {}),
              );
            } catch (e) {}
          },

          rememberWatchlistItem(item) {
            if (!item || !item.id) return;
            this.watchlistItemsCache[item.id] = item;
            this.saveWatchlistItemsCache();
          },

          forgetWatchlistItem(id) {
            if (!id || !this.watchlistItemsCache) return;
            if (this.watchlistItemsCache[id]) {
              delete this.watchlistItemsCache[id];
              this.saveWatchlistItemsCache();
            }
          },

          isInWatchlist(id) {
            if (!id) return false;
            return this.watchlist.includes(id);
          },

          toggleWatchlist(itemOrId) {
            const id =
              typeof itemOrId === "object" && itemOrId !== null
                ? itemOrId.id
                : itemOrId;
            if (!id) return;

            const wasIn = this.isInWatchlist(id);
            if (wasIn) {
              this.watchlist = this.watchlist.filter((itemId) => itemId !== id);
              this.forgetWatchlistItem(id);
            } else {
              this.watchlist.push(id);
              const data =
                (typeof itemOrId === "object" && itemOrId) ||
                (this.item?.id === id ? this.item : null);
              if (data) this.rememberWatchlistItem(data);
            }

            this.saveWatchlist();
            this.showToast(
              wasIn ? "از لیست شما حذف شد" : "به لیست شما اضافه شد",
            );
          },

          // =========================
          // ✅ Poster loader (FIXED)
          // =========================
          setPoster(src) {
            const finalSrc =
              src && String(src).trim() ? src : "./placeholder.png";

            this._posterFallbackUsed = false;
            this.posterLoaded = false;
            this.posterSrc = finalSrc;

            // مهم: اگر عکس از cache لود شده باشد، event load ممکن است سریع/نامطمئن باشد.
            // پس بعد از رندر شدن، complete را چک می‌کنیم.
            this.$nextTick(() => {
              const img = this.$refs?.posterImg;
              if (!img) return;

              // اگر همین الان لود شده بود (cached)
              if (img.complete && img.naturalWidth > 0) {
                this.posterLoaded = true;
              }
            });
          },

          handlePosterLoad() {
            this.posterLoaded = true;
          },

          handlePosterError() {
            // یکبار fallback کن، بعدش دیگه loop نشه
            if (this._posterFallbackUsed) {
              this.posterLoaded = true; // shimmer رو بردار
              return;
            }
            this._posterFallbackUsed = true;

            // رفتن روی placeholder
            this.posterLoaded = false;
            this.posterSrc = "./placeholder.png";

            this.$nextTick(() => {
              const img = this.$refs?.posterImg;
              if (!img) return;

              if (img.complete && img.naturalWidth > 0) {
                this.posterLoaded = true;
              }
            });
          },

          // =========================
          // ✅ Hero preload
          // =========================
          preloadHero(src) {
            this.heroLoaded = false;
            this.heroSrc = "";

            const candidate = src && String(src).trim() ? src : "";
            if (!candidate) {
              this.heroLoaded = true;
              return;
            }

            const img = new Image();
            img.onload = () => {
              this.heroSrc = candidate;
              this.heroLoaded = true;
            };
            img.onerror = () => {
              const fallback = "./placeholder.png";

              // اگر خود fallback هم خطا داد، فقط bg نذار
              if (candidate === fallback) {
                this.heroSrc = "";
                this.heroLoaded = true;
                return;
              }

              const img2 = new Image();
              img2.onload = () => {
                this.heroSrc = fallback;
                this.heroLoaded = true;
              };
              img2.onerror = () => {
                this.heroSrc = "";
                this.heroLoaded = true;
              };
              img2.src = fallback;
            };

            img.src = candidate;
          },

          // =========================
          // Network
          // =========================
          async fetchJson(url) {
            const res = await fetch(url, {
              headers: { Accept: "application/json" },
            });
            if (!res.ok) throw new Error("Network error");
            return res.json();
          },

          normalizeArr(v) {
            return Array.isArray(v) ? v : [];
          },

          normalizeDetailsPayload(payload) {
            const p = payload || {};

            const t = String(p.type || "").toLowerCase();
            const finalType =
              t === "series" || t === "serie" ? "series" : "movie";

            let duration = p.duration;
            if (typeof duration === "string") duration = duration.trim();
            if (!duration || duration === "N/A") duration = null;

            let durationText = duration;
            if (typeof durationText === "string") {
              const m = durationText.match(/(\d+)\s*min/i);
              if (m) durationText = `${m[1]} دقیقه`;
            }

            const country = this.normalizeArr(p.country);
            const genres = this.normalizeArr(p.genres);
            const sources = this.normalizeArr(p.sources);
            const seasons = this.normalizeArr(p.seasons);

            const normSeasons = seasons.map((s) => ({
              ...s,
              episodes: this.normalizeArr(s?.episodes).map((ep) => ({
                ...ep,
                sources: this.normalizeArr(ep?.sources),
              })),
            }));

            const countryText = country
              .map((c) => c?.title ?? c)
              .filter(Boolean)
              .join("، ");
            const genresText = genres.map((g) => g?.title ?? g).filter(Boolean);

            return {
              ...p,
              type: finalType,
              duration,
              durationText,
              country,
              genres,
              sources,
              seasons: normSeasons,
              _countryText: countryText,
              _genresText: genresText,
            };
          },

          async fetchData() {
            this.loading = true;
            this.error = "";
            this.item = null;
            this.seasons = [];
            this.openSeasons = [];
            this.playerSource = null;
            this.destroyPlayer();
            this.resetExtras();
            this.resetBinoSuggestions();

            // ✅ ریست‌های ظاهری (بدون flicker)
            this.posterLoaded = false;
            this.heroLoaded = false;

            const id = this.getQueryParam("id");
            const qt = this.getQueryParam("type");
            this.type = qt === "series" ? "series" : "movie";

            if (!id) {
              this.error =
                "شناسه آیتم نامعتبر است. لطفاً از صفحه اصلی یک عنوان را انتخاب کنید.";
              this.loading = false;
              return;
            }

            try {
              const url = `${this.baseUrl}${
                this.apiPrefix
              }/details?id=${encodeURIComponent(id)}&type=${encodeURIComponent(
                this.type,
              )}`;
              const json = await this.fetchJson(url);

              const details = this.normalizeDetailsPayload(json?.data);
              if (!details?.id) throw new Error("Invalid details payload");

              // ✅ ست کردن item اول (برای متن/اطلاعات)
              this.item = details;
              this.type = details.type;
              if (this.isInWatchlist(details.id))
                this.rememberWatchlistItem(details);

              this.prepareAiSummary(details?.ai_summary);
              this.funFacts = this.normalizeFunFacts(details?.fun_facts);

              if (this.type === "series") this.seasons = details.seasons || [];
              this.fetchBinoSuggestions(details);

              // ✅ Poster + Hero بعد از اینکه refs آماده شد
              const posterCandidate =
                details?.image || details?.cover || "./placeholder.png";
              this.setPoster(posterCandidate);

              const heroCandidate = details?.cover || details?.image || "";
              this.preloadHero(heroCandidate);

              try {
                localStorage.setItem(
                  "bebinto-last-item",
                  JSON.stringify(details),
                );
              } catch (e) {}
            } catch (e) {
              this.error = "خطا در دریافت جزئیات. لطفاً دوباره تلاش کنید.";
            } finally {
              this.loading = false;
            }
          },

          // =========================
          // Seasons
          // =========================
          toggleSeason(id) {
            if (!id) return;
            if (this.openSeasons.includes(id))
              this.openSeasons = this.openSeasons.filter((s) => s !== id);
            else this.openSeasons.push(id);
          },

          isPlayableVideoUrl(url) {
            const ext = this.getMediaExtension(url);
            return ["mp4", "m3u8", "webm", "ogv", "ogg", "mov", "mkv"].includes(
              ext,
            );
          },

          resolvePlayerCandidate(source, fallbackLabel = "") {
            const url = (source?.url || source?.src || "").toString().trim();
            if (!url || !this.isPlayableVideoUrl(url)) return null;

            return {
              url,
              mime: this.getMediaMime(url, source?.type),
              label:
                source?.quality ||
                source?.label ||
                source?.title ||
                fallbackLabel ||
                "ویدیو",
            };
          },

          playSource(source, fallbackLabel = "") {
            const candidate = this.resolvePlayerCandidate(source, fallbackLabel);
            if (!candidate) {
              this.showToast("این لینک برای پخش در مرورگر مناسب نیست");
              return;
            }

            this.playerSource = candidate;
            this.initPlayer(true);
            this.scrollPlayerIntoView();
          },

          destroyPlayer() {
            if (!this.player?.destroy) {
              this.player = null;
              return;
            }

            try {
              this.player.destroy();
            } catch (e) {}
            this.player = null;
          },

          initPlayer(shouldAutoplay = false) {
            this.$nextTick(() => {
              const el = this.$refs?.playerEl;
              if (!el || !this.playerSource || typeof Plyr === "undefined") {
                this.destroyPlayer();
                return;
              }

              this.destroyPlayer();
              this.player = new Plyr(el);

              if (shouldAutoplay) {
                const tryPlay = () => {
                  try {
                    const result = this.player?.play?.();
                    if (result?.catch) result.catch(() => {});
                  } catch (e) {}
                };

                if (this.player?.once) {
                  this.player.once("ready", tryPlay);
                } else {
                  setTimeout(tryPlay, 120);
                }
              }
            });
          },

          // =========================
          // Description parsing
          // =========================
          parseDescription(desc = "") {
            const parts = String(desc)
              .split(/\r?\n\r?\n/)
              .map((p) => p.trim())
              .filter(Boolean);

            const plotIndex = parts.findIndex(
              (p) =>
                p.startsWith("خلاصه داستان") || p.startsWith("خلاصه سریال"),
            );
            if (plotIndex !== -1) {
              return {
                meta: parts.slice(0, plotIndex),
                plot: parts.slice(plotIndex + 1).join("\n\n"),
              };
            }
            return { meta: [], plot: desc };
          },

          metaLines(item) {
            return item?.description
              ? this.parseDescription(item.description).meta
              : [];
          },

          plotText(item) {
            if (!item) return "";
            if (item.plot) return item.plot;
            if (item.description) {
              const { plot } = this.parseDescription(item.description);
              return plot || item.description;
            }
            return "خلاصه‌ای برای این عنوان ثبت نشده است.";
          },

          resetExtras() {
            this.aiSummary = "";
            this.aiSummaryShort = "";
            this.aiSummaryOpen = false;
            this.funFacts = [];
          },

          resetBinoSuggestions() {
            this.binoItems = [];
            this.binoPlaylist = null;
            this.binoRecsError = "";
            this.binoRecsLoading = false;
            if (this.binoSwiper?.destroy) {
              try {
                this.binoSwiper.destroy(true, true);
              } catch (e) {}
            }
            this.binoSwiper = null;
            this.binoSwiperInitAttempts = 0;
          },

          buildBinoPrompt(seed) {
            const title = this.displayTitle(seed);
            const kind = this.type === "series" ? "سریال" : "فیلم";
            const genres = this.displayGenres(seed).slice(0, 3).join("، ");
            const year = seed?.year ? ` محصول ${seed.year}` : "";
            const genreText = genres ? ` با حال‌وهوای ${genres}` : "";
            return `من ${kind} «${title}»${year}${genreText} را دوست داشتم. چند ${this.type === "series" ? "سریال" : "فیلم"} مشابه پیشنهاد بده و یک پلی‌لیست مرتبط هم معرفی کن.`;
          },

          normalizeSuggestionItem(raw) {
            if (!raw || !raw.id) return null;
            return {
              ...raw,
              type: String(raw?.type || "")
                .toLowerCase()
                .includes("series")
                ? "series"
                : "movie",
              image: raw?.image || raw?.cover || "./placeholder.png",
              _countryText: Array.isArray(raw?.country)
                ? raw.country
                    .map((c) => c?.title || c)
                    .filter(Boolean)
                    .join("، ")
                : Array.isArray(raw?.countries)
                  ? raw.countries
                      .map((c) => c?.title || c)
                      .filter(Boolean)
                      .join("، ")
                  : "",
              _genresText: Array.isArray(raw?.genres)
                ? raw.genres
                    .map((g) => (typeof g === "string" ? g : g?.title))
                    .filter(Boolean)
                : [],
            };
          },

          async fetchFallbackSuggestions(seed) {
            const title = this.displayTitle(seed);
            const firstGenre = this.displayGenres(seed)?.[0] || "";
            const searchQuery = firstGenre || title;

            const candidates = [];

            if (searchQuery) {
              try {
                const searchRes = await fetch(
                  `${this.baseUrl}${this.apiPrefix}/search?q=${encodeURIComponent(
                    searchQuery,
                  )}`,
                  { headers: { Accept: "application/json" } },
                );
                if (searchRes.ok) {
                  const sjson = await searchRes.json();
                  this.normalizeArr(sjson?.data?.posters).forEach((r) =>
                    candidates.push(r),
                  );
                }
              } catch (e) {}
            }

            const endpoint =
              this.type === "series"
                ? `${this.baseUrl}${this.apiPrefix}/series/top-rated?page=1`
                : `${this.baseUrl}${this.apiPrefix}/movies/top-rated?page=1`;
            try {
              const topRes = await fetch(endpoint, {
                headers: { Accept: "application/json" },
              });
              if (topRes.ok) {
                const tjson = await topRes.json();
                this.normalizeArr(tjson?.data).forEach((r) =>
                  candidates.push(r),
                );
              }
            } catch (e) {}

            const normalized = candidates
              .map((r) => this.normalizeSuggestionItem(r))
              .filter(Boolean)
              .filter((r) => Number(r.id) !== Number(seed.id));

            const uniq = new Map();
            normalized.forEach((r) => {
              if (!uniq.has(r.id)) uniq.set(r.id, r);
            });
            return Array.from(uniq.values()).slice(0, 10);
          },

          async fetchBinoSuggestions(seed, force = false) {
            if (!seed?.id || (this.binoRecsLoading && !force)) return;
            this.binoRecsLoading = true;
            this.binoRecsError = "";

            try {
              const response = await fetch(
                `${this.baseUrl}${this.apiPrefix}/chat`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json",
                    Accept: "application/json",
                  },
                  body: JSON.stringify({
                    message: this.buildBinoPrompt(seed),
                  }),
                },
              );

              if (!response.ok) throw new Error("bino recommendations failed");
              const data = await response.json();

              const normalized = this.normalizeArr(data?.results)
                .map((r) => this.normalizeSuggestionItem(r))
                .filter(Boolean)
                .filter((r) => Number(r.id) !== Number(seed.id));

              const uniq = new Map();
              normalized.forEach((r) => {
                if (!uniq.has(r.id)) uniq.set(r.id, r);
              });
              this.binoItems = Array.from(uniq.values()).slice(0, 10);

              if (!this.binoItems.length) {
                this.binoItems = await this.fetchFallbackSuggestions(seed);
              }

              const playlists = this.normalizeArr(data?.playlists);
              this.binoPlaylist = playlists.length ? playlists[0] : null;

              if (!this.binoPlaylist) {
                try {
                  const plistRes = await fetch(
                    `${this.baseUrl}${this.apiPrefix}/playlists?page=1`,
                    { headers: { Accept: "application/json" } },
                  );
                  if (plistRes.ok) {
                    const plistJson = await plistRes.json();
                    const fallbackPlaylists = this.normalizeArr(
                      plistJson?.data,
                    );
                    this.binoPlaylist = fallbackPlaylists.length
                      ? fallbackPlaylists[0]
                      : null;
                  }
                } catch (e) {}
              }

              this.initBinoSwiper();
            } catch (e) {
              this.binoRecsError = "فعلاً نتونستم پیشنهادات جدید بگیرم.";
              this.binoItems = [];
              this.binoPlaylist = null;
            } finally {
              this.binoRecsLoading = false;
            }
          },

          initBinoSwiper() {
            this.$nextTick(() => {
              if (!this.$refs?.binoSwiperEl || !this.binoItems.length) return;
              if (typeof Swiper === "undefined") {
                if (this.binoSwiperInitAttempts < 10) {
                  this.binoSwiperInitAttempts += 1;
                  setTimeout(() => this.initBinoSwiper(), 120);
                }
                return;
              }
              this.binoSwiperInitAttempts = 0;

              if (this.binoSwiper?.destroy) {
                try {
                  this.binoSwiper.destroy(true, true);
                } catch (e) {}
              }

              this.binoSwiper = new Swiper(this.$refs.binoSwiperEl, {
                slidesPerView: 1.35,
                spaceBetween: 12,
                speed: 550,
                loop: this.binoItems.length > 2,
                breakpoints: {
                  640: { slidesPerView: 2.2 },
                  1024: { slidesPerView: 2.8 },
                },
                pagination: {
                  el: this.$refs.binoSwiperPagination,
                  clickable: true,
                },
              });
            });
          },

          prepareAiSummary(rawSummary) {
            const summary =
              typeof rawSummary === "string" ? rawSummary.trim() : "";
            this.aiSummary = summary;
            this.aiSummaryShort = this.makeAiSummaryShort(summary);
            this.aiSummaryOpen = false;
          },

          makeAiSummaryShort(text) {
            if (!text) return "";
            const limit = 220;
            if (text.length <= limit) return text;

            const match = text.match(/.+?[.!؟](\s|$)/);
            const first = match ? match[0].trim() : "";
            if (first && first.length >= 60) return first;

            return text.slice(0, limit).trim() + "…";
          },

          normalizeFunFacts(facts) {
            if (!Array.isArray(facts)) return [];
            return facts
              .map((fact) => (typeof fact === "string" ? fact.trim() : ""))
              .filter(Boolean);
          },

          // Display helpers
          displayTitle(item) {
            return item?.title || item?.name || "بدون عنوان";
          },

          displayCountry(item) {
            if (!item) return "";
            return item._countryText || "";
          },

          displayGenres(item) {
            if (!item) return [];
            return Array.isArray(item._genresText)
              ? item._genresText.slice(0, 6)
              : [];
          },

          getSuggestionTypeLabel(item) {
            const t = String(item?.type || "").toLowerCase();
            return t === "series" || t === "serie" ? "سریال" : "فیلم";
          },

          suggestionDetailsUrl(item) {
            const t = String(item?.type || "").toLowerCase();
            const type = t === "series" || t === "serie" ? "series" : "movie";
            return `details.html?id=${encodeURIComponent(item?.id || "")}&type=${type}`;
          },

          suggestionCountry(item) {
            return item?._countryText || "";
          },

          suggestionGenres(item) {
            return Array.isArray(item?._genresText)
              ? item._genresText.slice(0, 2)
              : [];
          },
        };
      }
    </script>
